<!DOCTYPE html>
  <html lang="ar" dir="rtl">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>تكامل إنستقرام - النشر التلقائي</title>
      <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
                      --primary: #E1306C;
                      --secondary: #833AB4;
            --light: #FED373;
                          --dark: #2c3e50;
}
        body {
                      font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #833AB4 0%, #FD1D1D 50%, #F77737 100%);
                          color: white;
            padding: 20px;
            min-height: 100vh;
}
        .container { max-width: 1200px; margin: 0 auto; }
        header {
                      background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
}
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
                      background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 {
                      font-size: 1.8em;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--light);
            padding-bottom: 15px;
}
        .form-group {
                      margin-bottom: 20px;
}
        label {
                      display: block;
            margin-bottom: 8px;
            font-weight: 600;
}
        input, textarea, select {
                      width: 100%;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
}
        input:focus, textarea:focus {
                      outline: none;
            border-color: var(--light);
        }
        .btn {
                      padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-primary {
                      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
}
        .btn-primary:hover {
                      transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .stats-grid {
                      display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
}
        .stat-card {
                      background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
}
        .stat-value {
                      font-size: 2em;
            color: var(--light);
            font-weight: bold;
}
        .schedule-list {
                      list-style: none;
            max-height: 400px;
            overflow-y: auto;
}
        .schedule-item {
                      background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-right: 4px solid var(--light);
}
        .status {
                      padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
}
        .status.show {
            display: block;
        }
        .status.success {
            background: #27ae60;
        }
        .status.error {
            background: #e74c3c;
            }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
}
    </style>
      </head>
      <body>
          <div class="container">
              <header>
                  <h1>📸 تكامل إنستقرام - النشر التلقائي</h1>
                  <p>قم بتوصيل حسابك وجدولة الصور والفيديوهات بذكاء</p>
              </header>

              <div id="statusMessage" class="status"></div>

              <div class="grid-2">
                  <div class="card">
                      <h2>🔐 توصيل إنستقرام</h2>
                      <div id="connectionStatus" style="padding: 20px; text-align: center; color: var(--light);">
                          ❌ غير متصل
                      </div>
                      <button class="btn btn-primary" onclick="connectInstagram()" style="margin-top: 20px;">
                          🔑 اتصل بـ إنستقرام
                      </button>
                      <button class="btn btn-primary" id="disconnectBtn" onclick="disconnectInstagram()" style="display: none; margin-top: 10px; background: #e74c3c;">
                          ❌ قطع الاتصال
                      </button>
                      <div id="instagramInfo" style="margin-top: 20px; display: none;">
                          <div style="font-weight: bold; color: var(--light);">@<span id="instagramUsername"></span></div>
                          <div class="stats-grid" style="margin-top: 15px;">
                              <div class="stat-card">
                                  <div style="color: #999; font-size: 0.9em;">المتابعون</div>
                                  <div class="stat-value" id="instagramFollowers">0</div>
                              </div>
                              <div class="stat-card">
                                  <div style="color: #999; font-size: 0.9em;">المنشورات</div>
                                  <div class="stat-value" id="instagramPosts">0</div>
                              </div>
                          </div>
                      </div>
                  </div>

                  <div class="card">
                      <h2>📊 حالة النظام</h2>
                      <div class="stats-grid">
                          <div class="stat-card">
                              <div style="color: #999; font-size: 0.9em;">مجدول</div>
                              <div class="stat-value" id="scheduledCount">0</div>
                          </div>
                          <div class="stat-card">
                              <div style="color: #999; font-size: 0.9em;">منشور</div>
                              <div class="stat-value" id="publishedCount">0</div>
                          </div>
                      </div>
                      <label style="margin-top: 20px; display: flex; align-items: center; gap: 10px;">
                          <input type="checkbox" id="autoPublishToggle" onchange="toggleAutoPublish(this)">
                          <span>تفعيل النشر التلقائي</span>
                      </label>
                  </div>
              </div>

              <div class="card">
                  <h2>🖼️ جدول المنشور</h2>
                  <div class="form-group">
                      <label>عنوان المنشور</label>
                      <input type="text" id="postTitle" placeholder="أدخل عنوان المنشور">
                  </div>
                  <div class="form-group">
                      <label>التعليق (Caption)</label>
                      <textarea id="postCaption" placeholder="اكتب التعليق..."></textarea>
                  </div>
                  <div class="grid-2" style="margin-bottom: 20px;">
                      <div class="form-group">
                          <label>التاريخ</label>
                          <input type="date" id="scheduleDate">
                      </div>
                      <div class="form-group">
                          <label>الوقت</label>
                          <input type="time" id="scheduleTime">
                      </div>
                  </div>
                  <div class="form-group">
                      <label>الهاشتاجات</label>
                      <input type="text" id="postHashtags" placeholder="#مثال #مثال2">
                  </div>
                  <button class="btn btn-primary" onclick="schedulePost()">⏱️ جدول المنشور</button>
              </div>

              <div class="card">
                  <h2>📋 المنشورات المجدولة</h2>
                  <ul class="schedule-list" id="scheduleList"></ul>
                  <div id="emptySchedule" style="text-align: center; color: #999; padding: 40px;">
                      📭 لا توجد منشورات مجدولة
                  </div>
              </div>
          </div>

          <script>
              let instagramAuth = { isConnected: false, username: null, followers: 0, posts: 0 };
        let scheduledPosts = JSON.parse(localStorage.getItem('instagramScheduled')) || [];
        let autoPublishEnabled = localStorage.getItem('instagramAutoPublish') === 'true';

        window.addEventListener('DOMContentLoaded', function() {
                      loadAuth();
            updateDisplay();
            updateScheduleList();
            setInterval(checkAndPublish, 60000);
        });

        function connectInstagram() {
                      showStatus('جاري الاتصال...', 'success');
            setTimeout(() => {
                              instagramAuth = {
                                  isConnected: true,
                                  username: 'user_' + Math.random().toString(36).substr(2, 9),
                                  followers: Math.floor(Math.random() * 50000) + 1000,
                                  posts: Math.floor(Math.random() * 200)
              };
                saveAuth();
                updateDisplay();
                showStatus('✅ تم الاتصال بـ إنستقرام بنجاح!', 'success');
        }, 2000);
}

        function disconnectInstagram() {
                      if (confirm('هل تريد قطع الاتصال؟')) {
                instagramAuth = { isConnected: false, username: null, followers: 0, posts: 0 };
                localStorage.removeItem('instagramAuth');
                updateDisplay();
                showStatus('✅ تم قطع الاتصال', 'success');
                      }
        }

        function saveAuth() {
                      localStorage.setItem('instagramAuth', JSON.stringify(instagramAuth));
        }

        function loadAuth() {
                      const saved = localStorage.getItem('instagramAuth');
            if (saved) instagramAuth = JSON.parse(saved);
        }

        function updateDisplay() {
                      const status = document.getElementById('connectionStatus');
            const info = document.getElementById('instagramInfo');
            const btn = document.getElementById('disconnectBtn');

            if (instagramAuth.isConnected) {
                status.innerHTML = `<div style="color: #27ae60;">✅ متصل</div>`;
                document.getElementById('instagramUsername').textContent = instagramAuth.username;
                document.getElementById('instagramFollowers').textContent = instagramAuth.followers.toLocaleString();
                document.getElementById('instagramPosts').textContent = instagramAuth.posts;
                info.style.display = 'block';
                btn.style.display = 'block';
            } else {
                status.innerHTML = `<div style="color: var(--light);">❌ غير متصل</div>`;
                info.style.display = 'none';
                btn.style.display = 'none';
            }
        }

        function schedulePost() {
                      const title = document.getElementById('postTitle').value;
            const caption = document.getElementById('postCaption').value;
            const date = document.getElementById('scheduleDate').value;
            const time = document.getElementById('scheduleTime').value;
            const hashtags = document.getElementById('postHashtags').value;

            if (!title || !date || !time) {
                showStatus('⚠️ يرجى ملء الحقول المطلوبة', 'error');
                return;
            }

            if (!instagramAuth.isConnected) {
                showStatus('⚠️ يرجى الاتصال أولاً', 'error');
                return;
            }

            const post = {
                              id: Date.now(),
                                                title,
                                                caption: caption.substring(0, 2200),
                                                scheduledTime: new Date(date + 'T' + time).toISOString(),
                                                hashtags,
                                                status: 'scheduled',
                                                createdAt: new Date().toISOString()
                                };

            scheduledPosts.push(post);
            localStorage.setItem('instagramScheduled', JSON.stringify(scheduledPosts));

            document.getElementById('postTitle').value = '';
                          document.getElementById('postCaption').value = '';
                                        document.getElementById('scheduleDate').value = '';
                                                      document.getElementById('scheduleTime').value = '';
                                                                    document.getElementById('postHashtags').value = '';

            updateScheduleList();
            updateStats();
            showStatus('✅ تم جدولة المنشور بنجاح!', 'success');
        }

        function updateScheduleList() {
                      const list = document.getElementById('scheduleList');
            const empty = document.getElementById('emptySchedule');

            if (scheduledPosts.length === 0) {
                list.innerHTML = '';
                                  empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = scheduledPosts.map(post => `
                              <li class="schedule-item">
                                  <div style="color: var(--light); font-weight: bold;">${post.title}</div>
                                  <div style="color: #999; font-size: 0.9em; margin: 8px 0;">⏰ ${new Date(post.scheduledTime).toLocaleString('ar-SA')}</div>
                                  <div style="color: #bbb; margin: 8px 0;">حالة: ${post.status === 'scheduled' ? '⏱️ مجدول' : '✅ منشور'}</div>
                                  <button onclick="deletePost(${post.id})" style="margin-top: 8px; padding: 6px 12px; background: #e74c3c; border: none; border-radius: 6px; color: white; cursor: pointer;">حذف</button>
                              </li>
                          `).join('');

            updateStats();
        }

        function deletePost(id) {
                      scheduledPosts = scheduledPosts.filter(p => p.id !== id);
            localStorage.setItem('instagramScheduled', JSON.stringify(scheduledPosts));
            updateScheduleList();
            showStatus('✅ تم حذف المنشور', 'success');
        }

        function checkAndPublish() {
                      if (!autoPublishEnabled || !instagramAuth.isConnected) return;
            const now = new Date();
            scheduledPosts.forEach(post => {
                              if (post.status === 'scheduled' && new Date(post.scheduledTime) <= now) {
                                  post.status = 'published';
                                  showStatus(`✅ تم نشر المنشور: ${post.title}`, 'success');
        }
});
            localStorage.setItem('instagramScheduled', JSON.stringify(scheduledPosts));
            updateScheduleList();
}

        function toggleAutoPublish(checkbox) {
                      autoPublishEnabled = checkbox.checked;
            localStorage.setItem('instagramAutoPublish', autoPublishEnabled);
            showStatus(autoPublishEnabled ? '✅ تم تفعيل النشر التلقائي' : '✅ تم تعطيل النشر التلقائي', 'success');
        }

        function updateStats() {
                      const total = scheduledPosts.length;
            const published = scheduledPosts.filter(p => p.status === 'published').length;
            document.getElementById('scheduledCount').textContent = total - published;
            document.getElementById('publishedCount').textContent = published;
        }

        function showStatus(message, type) {
                      const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = 'status show ' + type;
            setTimeout(() => status.classList.remove('show'), 4000);
        }

        updateStats();
    </script>
      </body>
      </html>
